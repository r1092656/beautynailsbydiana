<!doctype html>
<html lang="en">
    <head>
        <title>BN | Diana - Contact</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <!--===============================================================================================-->
        <link rel="icon" type="image/png" href="images/icons/favicon.ico" />
        <!--===============================================================================================-->
        <link rel="stylesheet" type="text/css" href="./contactinfo/vendor/bootstrap/css5/bootstrap.min.css" />
        <!--===============================================================================================-->
        <link rel="stylesheet" type="text/css" href="fonts/font-awesome-4.7.0/css/font-awesome.min.css" />
        <!--===============================================================================================-->
        <link rel="stylesheet" type="text/css" href="./contactinfo/vendor/animate/animate.css" />
        <!--===============================================================================================-->
        <link rel="stylesheet" type="text/css" href="./contactinfo/vendor/css-hamburgers/hamburgers.min.css" />
        <!--===============================================================================================-->
        <link rel="stylesheet" type="text/css" href="./contactinfo/vendor/select2/select2.min.css" />
        <!--===============================================================================================-->
        <link rel="stylesheet" type="text/css" href="./contactinfo/css/util.css" />
        <link rel="stylesheet" type="text/css" href="./contactinfo/css/main.css" />
        <!--===============================================================================================-->
        <meta name="robots" content="noindex, follow" />
    </head>
    <body>
        <div class="bg-contact100" style="background-image: url(&quot;images/bg-01.jpg&quot;)">
            <div class="container-contact100">
                <div class="wrap-contact100">
                    <div class="contact100-pic js-tilt" data-tilt>
                        <img src="contactinfo/img/icons8-email-64.png" alt="IMG" style="width: 310px; height: auto" />
                    </div>

                    <form class="contact100-form validate-form">
                        <span class="contact100-form-title"> Get in touch </span>

                        <div class="wrap-input100 validate-input" data-validate="Name is required">
                            <input class="input100" type="text" name="name" placeholder="Name" />
                            <span class="focus-input100"></span>
                            <span class="symbol-input100">
                                <i class="fa fa-user" aria-hidden="true"></i>
                            </span>
                        </div>

                        <div class="wrap-input100 validate-input" data-validate="Valid email is required: ex@abc.xyz">
                            <input class="input100" type="text" name="email" placeholder="Email" />
                            <span class="focus-input100"></span>
                            <span class="symbol-input100">
                                <i class="fa fa-envelope" aria-hidden="true"></i>
                            </span>
                        </div>

                        <div class="wrap-input100 validate-input" data-validate="Message is required">
                            <textarea class="input100" name="message" placeholder="Message"></textarea>
                            <span class="focus-input100"></span>
                        </div>

                        <div class="container-contact100-form-btn">
                            <button class="contact100-form-btn">Send</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!--===============================================================================================-->
        <script src="./contactinfo/vendor/jquery/jquery-1.2.3.min.js"></script>
        <!--===============================================================================================-->
        <script src="./contactinfo/vendor/bootstrap/js5/popper.js"></script>
        <script src="./contactinfo/vendor/bootstrap/js5/bootstrap.min.js"></script>
        <!--===============================================================================================-->
        <script src="./contactinfo/vendor/select2/select2.min.js"></script>
        <!--===============================================================================================-->
        <script src="./contactinfo/vendor/tilt/tilt.jquery.min.js"></script>
        <script>
            $(".js-tilt").tilt({
                scale: 1.1
            });
        </script>
        <!--===============================================================================================-->
        <script src="./contactinfo/jsjs/main.js"></script>

        <!-- Global site tag (gtag.js) - Google Analytics -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=UA-23581568-13"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() {
                dataLayer.push(arguments);
            }
            gtag("js", new Date());

            gtag("config", "UA-23581568-13");
        </script>
    </body>
</html>
